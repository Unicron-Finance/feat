auth:
  interface: auth/interface.go
  deps:
    - golang.org/x/crypto/bcrypt@latest
  password-reset:
    files:
      - auth/password-reset/handler.go
      - auth/password-reset/types.go
      - auth/password-reset/validator.go
  email-verification:
    files:
      - auth/email-verify/sender.go
      - auth/email-verify/template.html
      - auth/email-verify/rate-limiter.go

payments:
  interface: payments/interface.go
  deps:
    - github.com/stripe/stripe-go/v74@74.x
  stripe-webhook:
    files:
      - payments/webhook/stripe.go
      - payments/webhook/verify.go

notifications:
  interface: notify/interface.go
  deps:
    - resend.com/resend-go@latest
  email-sender:
    files:
      - notify/email/sender.go
      - notify/email/queue.go
